name: edge-tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  edge-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/edge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Poetry and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-edge-poetry-${{ hashFiles('apps/edge/poetry.lock') }}

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry==1.8.2

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run edge tests
        run: poetry run pytest -q
