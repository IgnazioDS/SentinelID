name: release-tag

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  edge-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/edge
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Poetry and venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            apps/edge/.venv
          key: ${{ runner.os }}-edge-poetry-${{ hashFiles('apps/edge/poetry.lock') }}

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry==1.8.2

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run edge tests
        run: poetry run pytest -q

  cloud-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/cloud/requirements-dev.txt

      - name: Cache cloud virtualenv
        uses: actions/cache@v4
        with:
          path: apps/cloud/.venv
          key: ${{ runner.os }}-cloud-venv-${{ hashFiles('apps/cloud/requirements-dev.txt') }}

      - name: Install cloud deps in venv
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt

      - name: Run cloud tests
        env:
          ADMIN_API_TOKEN: dev-admin-token
        run: .venv/bin/python -m pytest -q

  desktop-build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev \
            libwebkit2gtk-4.0-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install desktop deps
        working-directory: apps/desktop
        run: npm ci

      - name: Build desktop web app
        working-directory: apps/desktop
        run: npm run build

      - name: Cargo check desktop runtime
        working-directory: apps/desktop/src-tauri
        run: cargo check

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cloud and admin images
        env:
          DOCKER_BUILDKIT: '1'
          COMPOSE_DOCKER_CLI_BUILD: '1'
        run: docker compose build cloud admin

  bench-edge:
    runs-on: ubuntu-latest
    needs: [edge-tests]
    defaults:
      run:
        working-directory: apps/edge
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Poetry and venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            apps/edge/.venv
          key: ${{ runner.os }}-edge-poetry-${{ hashFiles('apps/edge/poetry.lock') }}

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry==1.8.2

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run edge benchmark
        run: |
          LOG_FILE="${{ github.workspace }}/scripts/perf/out/bench_edge_${{ github.ref_name }}.log"
          OUT_FILE="${{ github.workspace }}/scripts/perf/out/bench_edge_${{ github.ref_name }}.json"
          mkdir -p "${{ github.workspace }}/scripts/perf/out"

          EDGE_ENV=dev ALLOW_FALLBACK_EMBEDDINGS=1 EDGE_AUTH_TOKEN=devtoken \
            poetry run uvicorn sentinelid_edge.main:app --host 127.0.0.1 --port 8787 >"${LOG_FILE}" 2>&1 &
          EDGE_PID=$!

          cleanup() {
            if kill -0 "${EDGE_PID}" >/dev/null 2>&1; then
              kill "${EDGE_PID}" >/dev/null 2>&1 || true
              wait "${EDGE_PID}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8787/api/v1/health" >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done

          if ! curl -fsS "http://127.0.0.1:8787/api/v1/health" >/dev/null 2>&1; then
            echo "edge bench server did not become healthy"
            tail -n 200 "${LOG_FILE}" || true
            exit 1
          fi

          python "${{ github.workspace }}/scripts/perf/bench_edge.py" \
            --base-url "http://127.0.0.1:8787" \
            --token "devtoken" \
            --attempts 5 \
            --frames 10 \
            --out "${OUT_FILE}"

      - name: Upload bench artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-edge-${{ github.ref_name }}
          path: |
            scripts/perf/out/*.json
            scripts/perf/out/*.log

  release-evidence:
    runs-on: ubuntu-22.04
    needs: [edge-tests, cloud-tests, desktop-build, docker-build, bench-edge]
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      evidence_pack_asset: ${{ steps.prepare_assets.outputs.evidence_pack_asset }}
      pilot_evidence_asset: ${{ steps.prepare_assets.outputs.pilot_evidence_asset }}
      runbook_lock_asset: ${{ steps.prepare_assets.outputs.runbook_lock_asset }}
    env:
      ADMIN_API_TOKEN: dev-admin-token
      ADMIN_UI_USERNAME: admin
      ADMIN_UI_PASSWORD_HASH_B64: 'JDJhJDEyJGJCY1Y5RHMydGNkdXR5QjdneVhMZi5HR3hoZzBGd2d1Lk1uUTdFQWRBcVJxQ1Bxak1SYW51'
      ADMIN_UI_PASSWORD: admin123!
      ADMIN_UI_SESSION_SECRET: ci-admin-session-secret
      ADMIN_UI_SESSION_TTL_MINUTES: '480'
      EDGE_AUTH_TOKEN: devtoken
      CLOUD_BIND_HOST: 0.0.0.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            apps/cloud/requirements-dev.txt
            apps/edge/poetry.lock

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry==1.8.2

      - name: Install edge dependencies
        working-directory: apps/edge
        env:
          POETRY_VIRTUALENVS_IN_PROJECT: "true"
        run: poetry install --no-interaction --no-ansi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            apps/admin/package-lock.json
            apps/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install admin dependencies
        working-directory: apps/admin
        run: npm ci

      - name: Install Linux deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev \
            libwebkit2gtk-4.0-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Run release parity checklist (with retry)
        timeout-minutes: 100
        env:
          RELEASE_PARITY_ATTEMPTS: '2'
        run: ./scripts/ci/run_release_parity.sh

      - name: Build runbook lock artifact
        run: RUNBOOK_LOCK_LABEL="${GITHUB_REF_NAME}" make runbook-lock

      - name: Build pilot evidence bundle
        run: RUNBOOK_LOCK_LABEL="${GITHUB_REF_NAME}" make pilot-evidence

      - name: Prepare release evidence assets
        id: prepare_assets
        run: |
          EVIDENCE_PACK_SRC="$(ls -1t output/release/evidence_pack_*.tar.gz | head -n 1)"
          PILOT_EVIDENCE_SRC="$(ls -1t output/release/pilot_evidence_*.tar.gz | head -n 1)"
          RUNBOOK_LOCK_SRC="$(ls -1t output/release/runbook_lock_*.tar.gz | head -n 1)"

          EVIDENCE_PACK_DST="output/release/evidence_pack_${GITHUB_REF_NAME}.tar.gz"
          PILOT_EVIDENCE_DST="output/release/pilot_evidence_${GITHUB_REF_NAME}.tar.gz"
          RUNBOOK_LOCK_DST="output/release/runbook_lock_${GITHUB_REF_NAME}.tar.gz"

          stage_asset() {
            local src="$1"
            local dst="$2"

            if [[ "${src}" == "${dst}" ]]; then
              echo "Asset already tag-stable: ${dst}"
              return 0
            fi

            cp "${src}" "${dst}"
          }

          stage_asset "${EVIDENCE_PACK_SRC}" "${EVIDENCE_PACK_DST}"
          stage_asset "${PILOT_EVIDENCE_SRC}" "${PILOT_EVIDENCE_DST}"
          stage_asset "${RUNBOOK_LOCK_SRC}" "${RUNBOOK_LOCK_DST}"

          echo "evidence_pack_asset=${EVIDENCE_PACK_DST}" >> "${GITHUB_OUTPUT}"
          echo "pilot_evidence_asset=${PILOT_EVIDENCE_DST}" >> "${GITHUB_OUTPUT}"
          echo "runbook_lock_asset=${RUNBOOK_LOCK_DST}" >> "${GITHUB_OUTPUT}"

      - name: Upload release evidence assets
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            ${{ steps.prepare_assets.outputs.evidence_pack_asset }}
            ${{ steps.prepare_assets.outputs.pilot_evidence_asset }}
            ${{ steps.prepare_assets.outputs.runbook_lock_asset }}

  publish-release-assets:
    runs-on: ubuntu-latest
    needs: [release-evidence]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download release evidence assets
        uses: actions/download-artifact@v4
        with:
          name: release-evidence-${{ github.ref_name }}
          path: output/release

      - name: Ensure release exists
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "SentinelID ${GITHUB_REF_NAME}" \
              --generate-notes
          fi

      - name: Upload evidence assets to release
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ needs.release-evidence.outputs.evidence_pack_asset }}" \
            "${{ needs.release-evidence.outputs.pilot_evidence_asset }}" \
            "${{ needs.release-evidence.outputs.runbook_lock_asset }}" \
            --clobber

      - name: Print evidence asset URLs
        run: |
          gh release view "${GITHUB_REF_NAME}" --json assets --jq '
            .assets
            | map(select(.name | test("^evidence_pack_|^pilot_evidence_|^runbook_lock_")))
            | .[]
            | "\(.name) -> \(.url)"'
